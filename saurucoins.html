<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SauruCoins — Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:    #c9a84c;
    --gold2:   #f0c96e;
    --dark:    #0a0c0f;
    --dark2:   #10141a;
    --dark3:   #161c24;
    --panel:   #1a2130;
    --border:  #2a3545;
    --green:   #4caf7d;
    --red:     #e05252;
    --blue:    #4a90d9;
    --text:    #c8d4e0;
    --muted:   #5a6a7a;
    --accent:  #c9a84c;
    --profile-w: 480px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 400;
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NOISE TEXTURE ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: .4;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    background: linear-gradient(135deg, #0d1219 0%, #151e2a 60%, #0d1219 100%);
    border-bottom: 2px solid var(--gold);
    padding: 20px 32px 18px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: 0 4px 40px rgba(201,168,76,.15);
    z-index: 10;
  }
  header::after {
    content: '';
    position: absolute; bottom: -6px; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold2), transparent);
    opacity: .5;
  }
  .logo-icon {
    font-size: 40px; line-height: 1;
    filter: drop-shadow(0 0 12px rgba(201,168,76,.6));
  }
  .logo-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px; letter-spacing: 4px;
    color: var(--gold2);
    text-shadow: 0 0 20px rgba(201,168,76,.4);
    line-height: 1;
  }
  .logo-text p {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted);
    letter-spacing: 3px; text-transform: uppercase;
    margin-top: 2px;
  }


  /* ── PORTAL LAYOUT: ranking left + profile right ── */
  .portal {
    position: relative; z-index: 1;
    display: flex;
    height: calc(100vh - 75px); /* full height minus header */
    overflow: hidden;
  }

  /* ── LEFT: LEADERBOARD ── */
  .lb-pane {
    flex: 0 0 380px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--dark2);
    overflow: hidden;
    transition: flex-basis .35s cubic-bezier(.4,0,.2,1);
  }
  .lb-pane-header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .lb-pane-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 2px; color: var(--text);
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 6px rgba(201,168,76,.5);
    flex-shrink: 0;
  }
  .lb-scroll {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .lb-scroll::-webkit-scrollbar { width: 4px; }
  .lb-scroll::-webkit-scrollbar-track { background: transparent; }
  .lb-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .lb-row {
    display: grid;
    grid-template-columns: 40px 32px 1fr 88px;
    padding: 10px 16px;
    border-bottom: 1px solid rgba(42,53,69,.5);
    align-items: center;
    transition: background .15s;
    cursor: pointer;
    gap: 8px;
  }
  .lb-row:hover { background: rgba(201,168,76,.06); }
  .lb-row.selected { background: rgba(201,168,76,.1); border-left: 3px solid var(--gold); }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; color: var(--muted);
  }
  .lb-row.top1 .lb-rank { color: #ffd700; text-shadow: 0 0 8px rgba(255,215,0,.4); }
  .lb-row.top2 .lb-rank { color: #c0c0c0; }
  .lb-row.top3 .lb-rank { color: #cd7f32; }
  .lb-insignia {
    width: 28px; height: 28px;
    object-fit: contain;
    image-rendering: crisp-edges;
    opacity: .9;
  }
  .lb-name {
    font-weight: 500; font-size: 14px;
    display: flex; flex-direction: column; gap: 1px;
    min-width: 0;
  }
  .lb-name > span:first-child {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .lb-rank-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px; color: var(--muted); letter-spacing: 1px;
  }
  .lb-pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; color: var(--gold);
    text-align: right;
  }
  .lb-you .lb-name > span:first-child { color: var(--gold2); }

  .lb-faction-flag {
    height: 13px; width: auto;
    vertical-align: middle;
    margin-left: 5px;
    border: 1px solid rgba(255,255,255,.12);
    image-rendering: crisp-edges;
    position: relative; top: -1px;
  }

  /* ── RIGHT: PROFILE PANEL ── */
  .profile-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Empty state shown when no user selected */
  .profile-empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    padding: 40px;
  }
  .profile-empty-state .big { font-size: 56px; line-height: 1; }
  .profile-empty-state p { line-height: 1.8; }

  /* Profile content */
  .profile-content {
    display: none;
    flex-direction: column;
    height: 100%;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    animation: slideIn .3s ease;
  }
  .profile-content::-webkit-scrollbar { width: 4px; }
  .profile-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .profile-content.visible { display: flex; }

  @keyframes slideIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: none; } }

  /* ── PROFILE CARD ── */
  .profile-card {
    background: var(--dark3);
    border-bottom: 1px solid var(--border);
    border-top: 3px solid var(--gold);
    padding: 24px 28px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 20px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .profile-card::before {
    content: '';
    position: absolute; top: 0; right: 0;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(201,168,76,.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .profile-close {
    position: absolute; top: 12px; right: 14px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 16px;
    width: 28px; height: 28px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
    font-family: monospace;
    line-height: 1;
  }
  .profile-close:hover { border-color: var(--gold); color: var(--gold); }

  .profile-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; letter-spacing: 3px;
    color: #fff; line-height: 1;
    margin-bottom: 8px;
    display: flex; align-items: center;
  }
  .faction-flag {
    height: 20px; width: auto;
    vertical-align: middle;
    margin-left: 12px;
    border: 1px solid rgba(255,255,255,.15);
    box-shadow: 0 0 8px rgba(0,0,0,.4);
    image-rendering: crisp-edges;
    position: relative; top: -2px;
  }
  .profile-rank-badge {
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(201,168,76,.08);
    border: 1px solid rgba(201,168,76,.25);
    padding: 6px 14px 6px 8px;
    margin-bottom: 14px;
  }
  .rank-insignia {
    width: 40px; height: 40px;
    object-fit: contain;
    image-rendering: crisp-edges;
    filter: drop-shadow(0 0 6px rgba(201,168,76,.2));
  }
  .rank-info { display: flex; flex-direction: column; gap: 1px; }
  .rank-number {
    font-family: 'DM Mono', monospace;
    font-size: 9px; color: var(--muted); letter-spacing: 1px;
    text-transform: uppercase;
  }
  .rank-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; color: var(--gold2); letter-spacing: 2px;
    line-height: 1;
  }
  .profile-stats {
    display: flex; gap: 20px; flex-wrap: wrap;
  }
  .stat-item { text-align: left; }
  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px; color: #fff; line-height: 1;
  }
  .stat-lbl {
    font-family: 'DM Mono', monospace;
    font-size: 9px; color: var(--muted);
    letter-spacing: 2px; text-transform: uppercase;
  }
  .points-display {
    display: flex; flex-direction: column;
    align-items: flex-end;
    justify-content: space-between;
    gap: 10px; min-width: 100px;
  }
  .profile-avatar {
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    box-shadow: 0 0 16px rgba(201,168,76,.25);
    object-fit: cover;
    display: block; margin-left: auto;
  }
  .profile-avatar-placeholder {
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--dark2);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; margin-left: auto;
  }
  .points-bottom { text-align: right; }
  .points-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px; color: var(--gold); line-height: 1;
    text-shadow: 0 0 30px rgba(201,168,76,.3);
  }
  .points-lbl {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted);
    letter-spacing: 3px; text-transform: uppercase;
  }

  /* ── PROGRESS BAR ── */
  .rank-progress-card {
    background: var(--dark3);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    flex-shrink: 0;
  }
  .prog-header {
    display: flex; justify-content: space-between;
    margin-bottom: 10px;
  }
  .prog-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase;
  }
  .prog-pct {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; color: var(--gold);
  }
  .prog-labels {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--muted);
    margin-bottom: 7px;
  }
  .prog-bar-bg {
    height: 7px; background: var(--dark2);
    border: 1px solid var(--border);
  }
  .prog-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    box-shadow: 0 0 10px rgba(201,168,76,.4);
    transition: width .8s cubic-bezier(.4,0,.2,1);
  }
  .prog-next {
    text-align: right; font-size: 12px; color: var(--muted); margin-top: 6px;
  }
  .prog-next span { color: var(--gold); font-weight: 700; }

  /* ── TWO COL inside profile ── */
  .profile-body {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border-top: 1px solid var(--border);
    overflow: hidden;
    min-height: 0;
  }
  @media(max-width: 900px) { .profile-body { grid-template-columns: 1fr; } }

  .profile-body-col {
    display: flex; flex-direction: column;
    overflow-y: auto;
    border-right: 1px solid var(--border);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .profile-body-col:last-child { border-right: none; }
  .profile-body-col::-webkit-scrollbar { width: 4px; }
  .profile-body-col::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── PANEL CARD (inside profile body) ── */
  .panel-card {
    background: var(--dark3);
    border: none;
    padding: 0;
    overflow: hidden;
    display: flex; flex-direction: column; flex: 1;
  }
  .panel-card-header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 18px;
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .panel-card-header h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; letter-spacing: 2px; color: var(--text);
  }
  .panel-body { padding: 0; flex: 1; }

  /* ── HIST TABLE ── */
  .hist-row {
    display: grid;
    grid-template-columns: 1fr 64px 56px 60px;
    padding: 8px 16px;
    border-bottom: 1px solid rgba(42,53,69,.5);
    font-size: 13px;
    transition: background .15s;
    gap: 6px;
  }
  .hist-row:hover { background: rgba(201,168,76,.04); }
  .hist-row:last-child { border-bottom: none; }
  .hist-motivo { color: var(--text); }
  .hist-delta { font-family: 'DM Mono', monospace; font-size: 12px; text-align: right; }
  .hist-delta.pos { color: var(--green); }
  .hist-delta.neg { color: var(--red); }
  .hist-dia { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-align: right; }
  .hist-hora { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-align: right; opacity: .7; }
  .hist-header {
    display: grid;
    grid-template-columns: 1fr 64px 56px 60px;
    padding: 6px 16px 5px; gap: 6px;
    background: rgba(10,12,15,.4);
    border-bottom: 1px solid var(--border);
  }
  .hist-header span {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase;
    text-align: right;
  }
  .hist-header span:first-child { text-align: left; }

  /* ── RESUMEN BLOCKS ── */
  .resumen-block {
    padding: 12px 18px;
    border-bottom: 1px solid rgba(42,53,69,.5);
  }
  .resumen-block:last-child { border-bottom: none; }
  .resumen-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px; letter-spacing: 1px;
    color: var(--text); margin-bottom: 7px;
  }
  .resumen-stats { display: flex; flex-wrap: wrap; gap: 10px; }
  .rs-item { display: flex; flex-direction: column; gap: 2px; min-width: 56px; }
  .rs-val { font-family: 'Bebas Neue', sans-serif; font-size: 18px; line-height: 1; color: #fff; }
  .rs-val.pos { color: var(--green); }
  .rs-val.neg { color: var(--red); }
  .rs-lbl { font-family: 'DM Mono', monospace; font-size: 8px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  /* ── HIST TOGGLE ── */
  .hist-toggle-btn {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 1px;
    padding: 3px 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    text-transform: uppercase;
    transition: all .2s;
  }
  .hist-toggle-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,.08); }

  /* ── MOTIVO TAGS ── */
  .tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 0.5px;
    padding: 2px 6px;
    border-radius: 2px;
    background: rgba(255,255,255,.05);
    color: #6a7a8a;
    border: 1px solid rgba(255,255,255,.07);
  }

  /* ── EMPTY / ERROR ── */
  .empty-state {
    text-align: center; padding: 40px 20px;
    font-family: 'DM Mono', monospace;
    color: var(--muted); font-size: 12px;
    letter-spacing: 2px;
  }
  .empty-state .big { font-size: 40px; display: block; margin-bottom: 10px; }

  /* ── LOADING ── */
  #loading-overlay {
    position: fixed; inset: 0;
    background: var(--dark);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    transition: opacity .5s;
  }
  #loading-overlay.hide { opacity: 0; pointer-events: none; }
  .spinner {
    width: 44px; height: 44px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 18px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .load-txt {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 3px;
    color: var(--muted); text-transform: uppercase;
  }

  /* ── RANGOS TABLE (guardada, oculta) ── */
  #rangos-data { display: none; }
  .rng-row {
    display: grid;
    grid-template-columns: 44px 1fr 90px;
    padding: 10px 20px;
    border-bottom: 1px solid rgba(42,53,69,.5);
    font-size: 14px;
  }
  .rng-row:last-child { border-bottom: none; }
  .rng-row.current-rank {
    background: rgba(201,168,76,.08);
    border-left: 3px solid var(--gold);
  }
  .rng-num { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--muted); }
  .rng-name { font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .rng-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px; padding: 2px 6px;
    background: rgba(201,168,76,.15); color: var(--gold); letter-spacing: 1px;
  }
  .rng-from { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); text-align: right; }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="load-txt">Cargando base de datos...</div>
</div>

<header>
  <div class="logo-icon">🦕</div>
  <div class="logo-text">
    <h1>SauruCoins</h1>
    <p>Portal de rango y puntos</p>
  </div>

</header>

<div class="portal">

  <!-- ── IZQUIERDA: RANKING ── -->
  <div class="lb-pane">
    <div class="lb-pane-header">
      <div class="dot"></div>
      <h2>Clasificación</h2>
    </div>
    <div class="lb-scroll" id="lb-body">
      <div class="empty-state"><span class="big">⏳</span>CARGANDO...</div>
    </div>
  </div>

  <!-- ── DERECHA: PERFIL ── -->
  <div class="profile-pane">

    <!-- Estado vacío -->
    <div class="profile-empty-state" id="profile-hint">
      <span class="big">🎖️</span>
      <p>Hacé click en un usuario<br>para ver su perfil</p>
    </div>

    <!-- Usuario no encontrado -->
    <div class="profile-empty-state" id="profile-empty" style="display:none">
      <span class="big">🔍</span>
      <p>USUARIO NO ENCONTRADO<br><br>
      <span style="font-size:10px">Escribí el nombre exactamente como aparece<br>en el chat de YouTube.</span></p>
    </div>

    <!-- Contenido de perfil -->
    <div class="profile-content" id="profile-section">

      <!-- Cabecera del perfil -->
      <div class="profile-card" id="profile-card-inner">
        <!-- se rellena por JS -->
      </div>

      <!-- Barra de progreso -->
      <div class="rank-progress-card" id="profile-progress">
        <!-- se rellena por JS -->
      </div>

      <!-- Cuerpo: historial + resumen -->
      <div class="profile-body">
        <div class="profile-body-col">
          <div class="panel-card">
            <div class="panel-card-header">
              <div class="dot"></div>
              <h3>Últimas actividades</h3>
              <button class="hist-toggle-btn" id="hist-toggle-btn" style="display:none"></button>
            </div>
            <div class="panel-body" id="hist-panel"></div>
          </div>
        </div>
        <div class="profile-body-col">
          <div class="panel-card">
            <div class="panel-card-header"><div class="dot"></div><h3>Resumen</h3></div>
            <div class="panel-body" id="resumen-panel"></div>
          </div>
        </div>
      </div>

    </div><!-- /profile-content -->

  </div><!-- /profile-pane -->

</div><!-- /portal -->

<!-- Tabla de rangos: guardada en el DOM, oculta hasta que decidamos dónde ubicarla -->
<div id="rangos-data">
  <div class="panel-card-header">
    <div class="dot"></div>
    <h3>Tabla de Rangos Militares</h3>
  </div>
  <div id="rangos-body"></div>
</div>

<!-- sql.js desde CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<script>
// ── RANGOS ──────────────────────────────────────────────────────
const RANGOS = [
  { num: 1,  nombre: "Recluta",            desde: 0    },
  { num: 2,  nombre: "Soldado raso",       desde: 20   },
  { num: 3,  nombre: "Soldado",            desde: 50   },
  { num: 4,  nombre: "Cabo",               desde: 90   },
  { num: 5,  nombre: "Cabo primero",       desde: 140  },
  { num: 6,  nombre: "Sargento",           desde: 210  },
  { num: 7,  nombre: "Sargento primero",   desde: 300  },
  { num: 8,  nombre: "Sargento mayor",     desde: 410  },
  { num: 9,  nombre: "Subteniente",        desde: 540  },
  { num: 10, nombre: "Teniente",           desde: 700  },
  { num: 11, nombre: "Teniente primero",   desde: 890  },
  { num: 12, nombre: "Capitán",            desde: 1110 },
  { num: 13, nombre: "Mayor",              desde: 1370 },
  { num: 14, nombre: "Teniente coronel",   desde: 1670 },
  { num: 15, nombre: "Coronel",            desde: 2010 },
  { num: 16, nombre: "Brigadier",          desde: 2390 },
  { num: 17, nombre: "General de brigada", desde: 2650 },
  { num: 18, nombre: "General de división",desde: 2850 },
  { num: 19, nombre: "General de ejército",desde: 3040 },
  { num: 20, nombre: "Mariscal",           desde: 3200 },
];

function getRango(puntos) {
  let rango = RANGOS[0];
  for (const r of RANGOS) { if (puntos >= r.desde) rango = r; else break; }
  return rango;
}
function getNextRango(puntos) {
  for (const r of RANGOS) { if (r.desde > puntos) return r; }
  return null;
}

const FACCION_PREFIJO = { us: "us", cw: "brit", pe: "panzer", wm: "heer" };
function rankPrefix(faccion) { return FACCION_PREFIJO[faccion] || "us"; }

let db = null;

function exec(sql, params = []) {
  if (!db) return [];
  const res = db.exec(sql, params);
  if (!res.length) return [];
  const cols = res[0].columns;
  return res[0].values.map(row => Object.fromEntries(cols.map((c, i) => [c, row[i]])));
}

async function initDB() {
  const SQL = await initSqlJs({
    locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}`
  });

  try {
    const resp = await fetch('puntos.json?t=' + Date.now());
    if (!resp.ok) throw new Error('no se pudo cargar puntos.json');
    const data = await resp.json();

    db = new SQL.Database();
    db.run(`CREATE TABLE usuarios (
      nombre TEXT PRIMARY KEY, puntos INTEGER DEFAULT 0,
      profile_img TEXT DEFAULT NULL, faccion TEXT DEFAULT NULL,
      total_apuestas INTEGER DEFAULT 0, total_ganadas INTEGER DEFAULT 0
    )`);
    db.run(`CREATE TABLE historial (
      id INTEGER PRIMARY KEY AUTOINCREMENT, nombre TEXT NOT NULL,
      delta INTEGER NOT NULL, motivo TEXT NOT NULL,
      puntos_new INTEGER NOT NULL, ts INTEGER DEFAULT 0
    )`);
    for (const u of (data.usuarios || [])) {
      db.run(
        "INSERT INTO usuarios (nombre, puntos, profile_img, faccion, total_apuestas, total_ganadas) VALUES (?,?,?,?,?,?)",
        [u.user, u.points, u.profile_img || null, u.faccion || null, u.total_apuestas || 0, u.total_ganadas || 0]
      );
      for (const h of (u.historial || [])) {
        db.run(
          "INSERT INTO historial (nombre, delta, motivo, puntos_new, ts) VALUES (?,?,?,?,?)",
          [u.user, h.delta, h.motivo, h.puntos, h.ts]
        );
      }
    }
    console.log('✅ DB cargada desde puntos.json —', data.actualizado);
  } catch(e) {
    console.error('❌ Error cargando puntos.json:', e);
    document.getElementById('loading-overlay').innerHTML =
      `<div style="text-align:center;font-family:'DM Mono',monospace;color:#e05252;padding:40px">
        <div style="font-size:48px;margin-bottom:16px">⚠️</div>
        NO SE ENCONTRÓ puntos.json<br><br>
        <span style="font-size:11px;color:#5a6a7a">El archivo se genera automáticamente cuando el servidor está corriendo.</span>
      </div>`;
    return;
  }

  document.getElementById('loading-overlay').classList.add('hide');
  renderLeaderboard();
  renderRangos();
}

// ── MOTIVOS ──────────────────────────────────────────────────────
const MOTIVO_MAP = {
  mensaje:          { label: 'Mensaje en chat',    cls: 'tag-msg' },
  pasivo:           { label: 'Presencia activa',   cls: 'tag-pas' },
  apuesta_colocada: { label: 'Apuesta',            cls: 'tag-bet' },
  apuesta_ganada:   { label: 'Apuesta ganada',     cls: 'tag-bet' },
  apuesta_perdida:  { label: 'Apuesta perdida',    cls: 'tag-bet' },
  apuesta_devuelta: { label: 'Apuesta devuelta',   cls: 'tag-bet' },
  bonus_participar: { label: 'Bonus participación',cls: 'tag-bon' },
  bonus_votar:      { label: 'Voto en encuesta',   cls: 'tag-bon' },
  ajuste_manual:    { label: 'Ajuste manual',      cls: 'tag-man' },
  trivia_acierto:   { label: 'Trivia acertada',    cls: 'tag-bon' },
  trivia_participar:{ label: 'Trivia (participó)',  cls: 'tag-pas' },
};
function motivoTag(m) {
  const info = MOTIVO_MAP[m] || { label: m, cls: 'tag-man' };
  return `<span class="tag ${info.cls}">${info.label}</span>`;
}
function fmtDia(ts)  { return ts ? new Date(ts).toLocaleDateString('es-AR',  { day:'2-digit', month:'2-digit' }) : ''; }
function fmtHora(ts) { return ts ? new Date(ts).toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' }) : ''; }

function factionFlagHtml(faccion, cssClass) {
  if (!faccion) return '';
  return `<img class="${cssClass}" src="armies/${faccion}.png" alt="${faccion}" title="Facción: ${faccion.toUpperCase()}" onerror="this.style.display='none'">`;
}

// ── LEADERBOARD ──────────────────────────────────────────────────
let selectedUser = '';

function renderLeaderboard() {
  const top = exec('SELECT nombre, puntos, faccion FROM usuarios ORDER BY puntos DESC');
  const html = top.map((u, i) => {
    const rank = i + 1;
    const rango = getRango(u.puntos);
    const cls = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : '';
    const isYou = u.nombre.toLowerCase() === selectedUser.toLowerCase() && selectedUser !== '';
    return `
      <div class="lb-row ${cls} ${isYou ? 'lb-you' : ''} ${u.nombre === selectedUser ? 'selected' : ''}"
           id="lb-${u.nombre.replace(/[^a-z0-9]/gi,'_')}"
           onclick="abrirPerfil('${u.nombre.replace(/'/g,"\\'")}')">
        <div class="lb-rank">${rank}</div>
        <img class="lb-insignia" src="ranks/${rankPrefix(u.faccion)}_${String(rango.num).padStart(2,'0')}.png" alt="${rango.nombre}">
        <div class="lb-name">
          <span>${u.nombre}${factionFlagHtml(u.faccion, 'lb-faction-flag')}</span>
          <span class="lb-rank-label">${rango.nombre}</span>
        </div>
        <div class="lb-pts">${u.puntos.toLocaleString('es-AR')}</div>
      </div>`;
  }).join('');
  document.getElementById('lb-body').innerHTML = html;
}

// ── ABRIR PERFIL (desde lb o búsqueda) ──────────────────────────
window.abrirPerfil = function(nombre) {
  selectedUser = nombre;

  // Actualizar "selected" en la lb sin re-renderizar
  document.querySelectorAll('.lb-row').forEach(r => r.classList.remove('selected'));
  const id = 'lb-' + nombre.replace(/[^a-z0-9]/gi,'_');
  const el = document.getElementById(id);
  if (el) el.classList.add('selected');

  const rows = exec('SELECT * FROM usuarios WHERE LOWER(nombre) = LOWER(?)', [nombre]);
  const hint  = document.getElementById('profile-hint');
  const empty = document.getElementById('profile-empty');
  const sec   = document.getElementById('profile-section');

  hint.style.display  = 'none';
  empty.style.display = 'none';
  sec.classList.remove('visible');

  if (!rows.length) { empty.style.display = 'flex'; return; }

  const u = rows[0];
  const puntos = u.puntos;
  const rango  = getRango(puntos);
  const next   = getNextRango(puntos);
  const pct    = next
    ? Math.round(((puntos - rango.desde) / (next.desde - rango.desde)) * 100)
    : 100;

  const pos   = exec('SELECT COUNT(*) as c FROM usuarios WHERE puntos > ?', [puntos]);
  const rank  = (pos[0]?.c ?? 0) + 1;
  const total = exec('SELECT COUNT(*) as c FROM usuarios')[0]?.c ?? 0;

  const totalVotos    = exec('SELECT COUNT(*) as c FROM historial WHERE nombre=? AND motivo=?', [u.nombre, 'bonus_votar'])[0]?.c ?? 0;
  const totalMensajes = exec('SELECT COUNT(*) as c FROM historial WHERE nombre=? AND motivo=?', [u.nombre, 'mensaje'])[0]?.c ?? 0;

  // Profile card
  document.getElementById('profile-card-inner').innerHTML = `
    <button class="profile-close" onclick="cerrarPerfil()" title="Cerrar">✕</button>
    <div>
      <div class="profile-name">
        ${u.nombre}${factionFlagHtml(u.faccion, 'faction-flag')}
      </div>
      <div class="profile-rank-badge">
        <img class="rank-insignia" src="ranks/${rankPrefix(u.faccion)}_${String(rango.num).padStart(2,'0')}.png" alt="${rango.nombre}">
        <div class="rank-info">
          <span class="rank-number">Rango ${rango.num}</span>
          <span class="rank-name">${rango.nombre}</span>
        </div>
      </div>
      <div class="profile-stats">
        <div class="stat-item"><div class="stat-val">#${rank}</div><div class="stat-lbl">de ${total}</div></div>
        <div class="stat-item"><div class="stat-val">${u.total_apuestas}</div><div class="stat-lbl">apuestas</div></div>
        <div class="stat-item"><div class="stat-val">${totalVotos}</div><div class="stat-lbl">votos</div></div>
        <div class="stat-item"><div class="stat-val">${totalMensajes}</div><div class="stat-lbl">mensajes</div></div>
      </div>
    </div>
    <div class="points-display">
      ${u.profile_img
        ? `<img class="profile-avatar" src="${u.profile_img}" alt="${u.nombre}" onerror="this.style.display='none'">`
        : `<div class="profile-avatar-placeholder">🦕</div>`}
      <div class="points-bottom">
        <div class="points-big">${puntos.toLocaleString('es-AR')}</div>
        <div class="points-lbl">SauruCoins</div>
      </div>
    </div>
  `;

  // Progress
  document.getElementById('profile-progress').innerHTML = `
    <div class="prog-header">
      <span class="prog-title">Progreso de rango</span>
      <span class="prog-pct">${pct}%</span>
    </div>
    <div class="prog-labels">
      <span>${rango.nombre} (${rango.desde.toLocaleString()})</span>
      <span>${next ? next.nombre + ' (' + next.desde.toLocaleString() + ')' : '🏆 MÁXIMO'}</span>
    </div>
    <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
    ${next
      ? `<div class="prog-next">Faltan <span>${(next.desde - puntos).toLocaleString()}</span> pts para ${next.nombre}</div>`
      : '<div class="prog-next" style="color:var(--gold)">⭐ RANGO MÁXIMO ALCANZADO</div>'}
  `;

  // Historial
  const hist = exec('SELECT delta, motivo, puntos_new, ts FROM historial WHERE nombre = ? ORDER BY ts DESC LIMIT 10', [u.nombre]);
  const histTotal = exec('SELECT COUNT(*) as c FROM historial WHERE nombre = ?', [u.nombre])[0]?.c ?? 0;
  const histHeader = `<div class="hist-header"><span>Actividad</span><span>Pts</span><span>Día</span><span>Hora</span></div>`;
  const histRows = hist.map(h => `
    <div class="hist-row">
      <div class="hist-motivo">${motivoTag(h.motivo)}</div>
      <div class="hist-delta ${h.delta >= 0 ? 'pos' : 'neg'}">${h.delta >= 0 ? '+' : ''}${h.delta}</div>
      <div class="hist-dia">${fmtDia(h.ts)}</div>
      <div class="hist-hora">${fmtHora(h.ts)}</div>
    </div>`).join('');
  document.getElementById('hist-panel').innerHTML = hist.length
    ? histHeader + histRows
    : '<div class="empty-state" style="padding:30px">Sin actividad</div>';

  const toggleBtn = document.getElementById('hist-toggle-btn');
  if (histTotal > 10) {
    toggleBtn.style.display = '';
    toggleBtn.textContent = `Ver todo (${histTotal})`;
    toggleBtn.dataset.expanded = '0';
    toggleBtn.dataset.user = u.nombre;
    toggleBtn.onclick = function() { toggleHistorial(u.nombre, this); };
  } else {
    toggleBtn.style.display = 'none';
  }

  // Resumen
  document.getElementById('resumen-panel').innerHTML = buildResumen(u.nombre);

  sec.classList.add('visible');
};

window.cerrarPerfil = function() {
  selectedUser = '';
  document.querySelectorAll('.lb-row').forEach(r => r.classList.remove('selected'));
  document.getElementById('profile-section').classList.remove('visible');
  document.getElementById('profile-hint').style.display  = 'flex';
  document.getElementById('profile-empty').style.display = 'none';
};

// ── TOGGLE HISTORIAL ─────────────────────────────────────────────
window.toggleHistorial = function(nombre, btn) {
  const panel = document.getElementById('hist-panel');
  const isExpanded = btn.dataset.expanded === '1';
  const header = `<div class="hist-header"><span>Actividad</span><span>Pts</span><span>Día</span><span>Hora</span></div>`;
  const renderRows = rows => rows.map(h => `
    <div class="hist-row">
      <div class="hist-motivo">${motivoTag(h.motivo)}</div>
      <div class="hist-delta ${h.delta >= 0 ? 'pos' : 'neg'}">${h.delta >= 0 ? '+' : ''}${h.delta}</div>
      <div class="hist-dia">${fmtDia(h.ts)}</div>
      <div class="hist-hora">${fmtHora(h.ts)}</div>
    </div>`).join('');

  if (isExpanded) {
    const hist = exec('SELECT delta, motivo, puntos_new, ts FROM historial WHERE nombre = ? ORDER BY ts DESC LIMIT 10', [nombre]);
    panel.innerHTML = header + renderRows(hist);
    btn.textContent = `Ver todo (${exec('SELECT COUNT(*) as c FROM historial WHERE nombre = ?', [nombre])[0]?.c ?? 0})`;
    btn.dataset.expanded = '0';
  } else {
    const hist = exec('SELECT delta, motivo, puntos_new, ts FROM historial WHERE nombre = ? ORDER BY ts DESC', [nombre]);
    panel.innerHTML = header + renderRows(hist);
    btn.textContent = 'Ver menos';
    btn.dataset.expanded = '1';
  }
};

// ── RESUMEN ──────────────────────────────────────────────────────
function buildResumen(nombre) {
  let html = '';

  const msgRows  = exec('SELECT COUNT(*) as cnt, SUM(delta) as total FROM historial WHERE nombre=? AND motivo=?', [nombre, 'mensaje']);
  const msgCnt   = msgRows[0]?.cnt || 0;
  const msgTotal = msgRows[0]?.total || 0;
  if (msgCnt > 0) {
    html += `<div class="resumen-block">
      <div class="resumen-title">💬 Mensajes en chat</div>
      <div class="resumen-stats">
        <span class="rs-item"><span class="rs-val">${msgCnt}</span><span class="rs-lbl">mensajes</span></span>
        <span class="rs-item"><span class="rs-val pos">+${msgTotal}</span><span class="rs-lbl">pts ganados</span></span>
      </div></div>`;
  }

  const pasRows  = exec('SELECT COUNT(*) as cnt, SUM(delta) as total FROM historial WHERE nombre=? AND motivo=?', [nombre, 'pasivo']);
  const pasCnt   = pasRows[0]?.cnt || 0;
  const pasTotal = pasRows[0]?.total || 0;
  if (pasCnt > 0) {
    const minutos = pasCnt * 30;
    const horas   = Math.floor(minutos / 60);
    const mins    = minutos % 60;
    const tiempoStr = horas > 0 ? `${horas}h ${mins > 0 ? mins + 'min' : ''}`.trim() : `${mins}min`;
    html += `<div class="resumen-block">
      <div class="resumen-title">⏱️ Presencia activa</div>
      <div class="resumen-stats">
        <span class="rs-item"><span class="rs-val">${tiempoStr}</span><span class="rs-lbl">de stream</span></span>
        <span class="rs-item"><span class="rs-val">${pasCnt}</span><span class="rs-lbl">intervalos 30min</span></span>
        <span class="rs-item"><span class="rs-val pos">+${pasTotal}</span><span class="rs-lbl">pts ganados</span></span>
      </div></div>`;
  }

  const apColocadas = exec('SELECT COUNT(*) as cnt, SUM(delta) as total FROM historial WHERE nombre=? AND motivo=?', [nombre, 'apuesta_colocada']);
  const apGanadas   = exec('SELECT COUNT(*) as cnt, SUM(delta) as total FROM historial WHERE nombre=? AND motivo=?', [nombre, 'apuesta_ganada']);
  const apDevueltas = exec('SELECT COUNT(*) as cnt, SUM(delta) as total FROM historial WHERE nombre=? AND motivo=?', [nombre, 'apuesta_devuelta']);
  const apBonus     = exec('SELECT COUNT(*) as cnt, SUM(delta) as total FROM historial WHERE nombre=? AND motivo=?', [nombre, 'bonus_participar']);
  const totalAp  = apColocadas[0]?.cnt || 0;
  const montoAp  = apColocadas[0]?.total || 0;
  const totalGan = apGanadas[0]?.cnt || 0;
  const montoGan = apGanadas[0]?.total || 0;
  const totalDev = apDevueltas[0]?.cnt || 0;
  const montoDev = apDevueltas[0]?.total || 0;
  const bonusCnt   = apBonus[0]?.cnt || 0;
  const bonusTotal = apBonus[0]?.total || 0;
  const calcPerd = totalAp - totalGan - totalDev;
  const netoApuesta = montoAp + montoGan + montoDev;
  if (totalAp > 0) {
    const apValidas = totalAp - totalDev;
    const winrate   = apValidas > 0 ? Math.round(totalGan / apValidas * 100) : 0;
    const netoClass = netoApuesta >= 0 ? 'pos' : 'neg';
    const netoStr   = (netoApuesta >= 0 ? '+' : '') + netoApuesta;
    const montoApostado = Math.abs(montoAp);
    html += `<div class="resumen-block">
      <div class="resumen-title">🎲 Apuestas <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0;font-weight:400">(pozo proporcional)</span></div>
      <div class="resumen-stats">
        <span class="rs-item"><span class="rs-val">${totalAp}</span><span class="rs-lbl">jugadas</span></span>
        <span class="rs-item"><span class="rs-val neg">−${montoApostado}</span><span class="rs-lbl">apostados</span></span>
        <span class="rs-item"><span class="rs-val">${totalGan}</span><span class="rs-lbl">ganadas (+${montoGan})</span></span>
        ${calcPerd > 0 ? `<span class="rs-item"><span class="rs-val neg">${calcPerd}</span><span class="rs-lbl">perdidas</span></span>` : ''}
        ${totalDev > 0 ? `<span class="rs-item"><span class="rs-val">${totalDev}</span><span class="rs-lbl">devueltas (+${montoDev})</span></span>` : ''}
        <span class="rs-item"><span class="rs-val" style="color:#4ab8d4">${apValidas > 0 ? winrate : '—'}%</span><span class="rs-lbl">winrate</span></span>
        <span class="rs-item"><span class="rs-val ${netoClass}">${netoStr}</span><span class="rs-lbl">balance</span></span>
        ${bonusCnt > 0 ? `<span class="rs-item"><span class="rs-val" style="color:var(--gold)">+${bonusTotal}</span><span class="rs-lbl">bono jugar</span></span>` : ''}
      </div></div>`;
  }

  const votRows  = exec('SELECT COUNT(*) as cnt, SUM(delta) as total FROM historial WHERE nombre=? AND motivo=?', [nombre, 'bonus_votar']);
  const votCnt   = votRows[0]?.cnt || 0;
  const votTotal = votRows[0]?.total || 0;
  if (votCnt > 0) {
    html += `<div class="resumen-block">
      <div class="resumen-title">🗳️ Votos en encuestas</div>
      <div class="resumen-stats">
        <span class="rs-item"><span class="rs-val">${votCnt}</span><span class="rs-lbl">votos</span></span>
        <span class="rs-item"><span class="rs-val pos">+${votTotal}</span><span class="rs-lbl">pts ganados</span></span>
      </div></div>`;
  }

  // ── TRIVIA ──
  const trivAcierto = exec('SELECT COUNT(*) as cnt, SUM(delta) as total FROM historial WHERE nombre=? AND motivo=?', [nombre, 'trivia_acierto']);
  const trivPartic  = exec('SELECT COUNT(*) as cnt, SUM(delta) as total FROM historial WHERE nombre=? AND motivo=?', [nombre, 'trivia_participar']);
  const trivAciCnt  = trivAcierto[0]?.cnt   || 0;
  const trivAciPts  = trivAcierto[0]?.total  || 0;
  const trivParCnt  = trivPartic[0]?.cnt    || 0;
  const trivParPts  = trivPartic[0]?.total   || 0;
  const trivTotal   = trivAciCnt + trivParCnt;
  if (trivTotal > 0) {
    const winrateTrv = trivTotal > 0 ? Math.round(trivAciCnt / trivTotal * 100) : 0;
    html += `<div class="resumen-block">
      <div class="resumen-title">🧠 Trivias</div>
      <div class="resumen-stats">
        <span class="rs-item"><span class="rs-val">${trivTotal}</span><span class="rs-lbl">jugadas</span></span>
        <span class="rs-item"><span class="rs-val pos">${trivAciCnt}</span><span class="rs-lbl">acertadas (+${trivAciPts} pts)</span></span>
        ${trivParCnt > 0 ? `<span class="rs-item"><span class="rs-val neg">${trivParCnt}</span><span class="rs-lbl">falladas (+${trivParPts} pts)</span></span>` : ''}
        <span class="rs-item"><span class="rs-val" style="color:#4ab8d4">${winrateTrv}%</span><span class="rs-lbl">aciertos</span></span>
        <span class="rs-item"><span class="rs-val pos">+${trivAciPts + trivParPts}</span><span class="rs-lbl">pts totales</span></span>
      </div></div>`;
  }

  const adjRows = exec('SELECT COUNT(*) as cnt, SUM(CASE WHEN delta>0 THEN delta ELSE 0 END) as ganado, SUM(CASE WHEN delta<0 THEN delta ELSE 0 END) as perdido FROM historial WHERE nombre=? AND motivo=?', [nombre, 'ajuste_manual']);
  const adjCnt  = adjRows[0]?.cnt || 0;
  if (adjCnt > 0) {
    const adjGan  = adjRows[0]?.ganado || 0;
    const adjPerd = adjRows[0]?.perdido || 0;
    html += `<div class="resumen-block">
      <div class="resumen-title">⚙️ Ajustes manuales</div>
      <div class="resumen-stats">
        <span class="rs-item"><span class="rs-val">${adjCnt}</span><span class="rs-lbl">ajustes</span></span>
        ${adjGan  > 0 ? `<span class="rs-item"><span class="rs-val pos">+${adjGan}</span><span class="rs-lbl">añadidos</span></span>` : ''}
        ${adjPerd < 0 ? `<span class="rs-item"><span class="rs-val neg">${adjPerd}</span><span class="rs-lbl">descontados</span></span>` : ''}
      </div></div>`;
  }

  return html || '<div class="empty-state" style="padding:24px">Sin datos</div>';
}

// ── RANGOS TABLE (guardada, oculta) ─────────────────────────────
function renderRangos() {
  const avgRow   = exec('SELECT AVG(puntos) as a FROM usuarios')[0];
  const avg      = avgRow?.a ?? 0;
  const topRow   = exec('SELECT MAX(puntos) as m FROM usuarios')[0];
  const topPts   = topRow?.m ?? 0;
  const topRango = getRango(topPts);

  const html = RANGOS.map(r => {
    const isTop = r.num === topRango.num;
    const isAvg = r.num === getRango(avg).num;
    return `<div class="rng-row" id="rng-${r.num}">
      <div class="rng-num">${r.num}</div>
      <div class="rng-name">${r.nombre}
        ${isTop ? '<span class="rng-badge">TOP 1</span>' : ''}
        ${isAvg ? '<span class="rng-badge">PROMEDIO</span>' : ''}
      </div>
      <div class="rng-from">${r.desde.toLocaleString('es-AR')}</div>
    </div>`;
  }).join('');
  document.getElementById('rangos-body').innerHTML = html;
}

// ── ARRANCAR ─────────────────────────────────────────────────────
initDB();
</script>
</body>
</html>
