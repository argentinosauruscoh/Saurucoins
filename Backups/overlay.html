<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Overlay Apuestas</title>
<style>
  body {
    margin: 0;
    background: transparent;
    font-family: Arial, sans-serif;
    color: #fff;
    text-align: center;
    opacity: 0;
  }

  h1 {
    font-size: 26px;
    font-weight: bold;
    text-shadow: 2px 2px 4px #000;
    margin-bottom: 10px;
  }

  #timer {
    position: absolute;
    top: 10px;
    right: 20px;
    font-size: 22px;
    font-weight: bold;
    color: white;
    text-shadow: 2px 2px 4px #000;
  }

  /* --- Pozo ajustado para no superponerse --- */
  #pozo {
    position: absolute;
    top: 85px; /* subido para despejar las barras */
    right: 20px;
    font-size: 20px;
    font-weight: bold;
    color: #00ff66;
    text-shadow: 2px 2px 5px #000;
    background: rgba(0,0,0,0.4);
    padding: 4px 8px;
    border-radius: 6px;
  }

  .bar-container {
    position: relative;
    width: 80%;
    margin: 14px auto;
    background: #333;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
  }

  .bar {
    height: 32px;
    line-height: 32px;
    font-size: 15px;
    font-weight: bold;
    text-align: center;
    text-shadow: 1px 1px 3px #000;
    border-radius: 20px;
    transition: width 1s ease-in-out;
    width: 0%;
    white-space: pre;
  }

  .filled {
    background: #ffd700 !important;
    color: #444 !important;
  }

  .value { color: #444; }

  #status {
    margin-top: 10px;
    font-size: 18px;
    font-weight: bold;
    text-shadow: 2px 2px 4px #000;
    color: #00ff66;
  }

  #recent-bets {
    margin-top: 10px;
    font-size: 16px;
    font-weight: bold;
    text-shadow: 2px 2px 5px #000;
    max-height: 300px;
    overflow: hidden;
    position: absolute;
    top: 140px;
    right: 20px;
    text-align: left;
  }

  #recent-bets div { margin: 2px 0; }

  @keyframes blink-white {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(3) saturate(0); }
  }

  .winner { animation: blink-white 1s step-start infinite; }

  .fade-out { animation: fadeOut 1s forwards; }
  @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

  .fade-in { animation: fadeIn 0.6s forwards; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* === BANNER SUPERIOR === */
  #winner-banner {
    position: fixed;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    padding: 14px 36px;
    border-radius: 0 0 20px 20px;
    font-size: 26px;
    font-weight: bold;
    color: white;
    text-shadow: 2px 2px 6px #000;
    box-shadow: 0 4px 20px rgba(0,0,0,0.8);
    opacity: 0;
    z-index: 998;
  }

  #winner-banner.show {
    animation: slideDown 0.6s ease forwards, glow 1.2s ease-in-out infinite alternate;
  }

  @keyframes slideDown {
    from { top: -100px; opacity: 0; }
    to { top: 0; opacity: 1; }
  }

  @keyframes glow {
    from { box-shadow: 0 0 10px #fff; }
    to { box-shadow: 0 0 25px #ffff00; }
  }

  /* === GIFS LATERALES === */
  #gifAliados, #gifEje {
    position: fixed;
    transform: translateY(-50%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.8s ease-in-out, left 0.8s ease-in-out;
    z-index: 999;
    filter: drop-shadow(2px 2px 4px black);
  }

  #gifAliados.show, #gifEje.show { opacity: 1; }

  #gifAliados {
    height: 65px;
    left: -120px;
    transform: translateY(-50%) scaleX(-1); /* mira hacia el centro */
  }

  #gifEje {
    height: 100px; /* aumentado */
    left: -120px;
    transform: translateY(-50%) scaleX(-1); /* mira hacia el centro */
  }

  .move-in { left: 150px !important; }
</style>
</head>
<body>
  <h1>¿Qué ejército gana? (<em>utiliza el comando !apostar</em>)</h1>
  <div id="timer">02:00</div>
  <div id="pozo">Pozo: 0 pts</div>

  <div class="bar-container">
    <div id="bar1" class="bar"></div>
  </div>

  <div class="bar-container">
    <div id="bar2" class="bar"></div>
  </div>

  <div id="status">Esperando evento de apuestas...</div>
  <div id="recent-bets"><strong>Apuestas recientes:</strong></div>

  <img id="gifAliados" src="aliados.gif" alt="Aliados" />
  <img id="gifEje" src="eje.gif" alt="Eje" />

  <div id="winner-banner"></div>

<script>
  let lastState = {};
  let localTimer = 120;
  let overlayReady = false;

  function startOverlay() {
    document.body.classList.remove("fade-out");
    document.body.classList.add("fade-in");
    document.body.style.opacity = "1";
    document.getElementById("winner-banner").classList.remove("show");
    hideGifs();
  }

  function hideGifs() {
    const gifA = document.getElementById("gifAliados");
    const gifE = document.getElementById("gifEje");
    gifA.classList.remove("show", "move-in");
    gifE.classList.remove("show", "move-in");
    gifA.style.left = "-120px";
    gifE.style.left = "-120px";
  }

  function formatTime(sec) {
    const m = Math.floor(sec / 60),
          s = sec % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
  }

  function updateTimer(sec) {
    const timerEl = document.getElementById("timer");
    timerEl.innerText = formatTime(sec);
    timerEl.style.color = sec <= 10 ? "red" : sec <= 30 ? "yellow" : "white";
  }

  function updateBars(data) {
    const option1 = data.option1 || 0;
    const option2 = data.option2 || 0;
    const total = option1 + option2;
    const pct1 = total ? Math.round((option1 / total) * 100) : 0;
    const pct2 = total ? Math.round((option2 / total) * 100) : 0;

    const bar1 = document.getElementById("bar1");
    const bar2 = document.getElementById("bar2");
    const gap = "    ";

    if (option1 > 0) {
      bar1.classList.add("filled");
      bar1.style.width = pct1 + "%";
      bar1.innerHTML = `ALIADOS (Opción 1)${gap}<span class="value">${option1} pts (${pct1}%)</span>`;
    } else {
      bar1.classList.remove("filled");
      bar1.style.width = "0%";
      bar1.innerHTML = "";
    }

    if (option2 > 0) {
      bar2.classList.add("filled");
      bar2.style.width = pct2 + "%";
      bar2.innerHTML = `EJE (Opción 2)${gap}<span class="value">${option2} pts (${pct2}%)</span>`;
    } else {
      bar2.classList.remove("filled");
      bar2.style.width = "0%";
      bar2.innerHTML = "";
    }

    document.getElementById("pozo").innerText = "Pozo: " + total + " pts";
  }

  function updateRecentBets(bets) {
    const container = document.getElementById("recent-bets");
    container.innerHTML = "<strong>Apuestas recientes:</strong>";
    (bets || []).slice(-15).forEach(b => {
      const div = document.createElement("div");
      div.textContent = `${b.user}: ${b.option} (${b.points} pts)`;
      container.appendChild(div);
    });
  }

  function declareWinner(option) {
    const banner = document.getElementById("winner-banner");
    const gifA = document.getElementById("gifAliados");
    const gifE = document.getElementById("gifEje");
    const bar1 = document.getElementById("bar1");
    const bar2 = document.getElementById("bar2");

    const bar1Rect = bar1.getBoundingClientRect();
    const bar2Rect = bar2.getBoundingClientRect();
    const mid1 = bar1Rect.top + bar1Rect.height / 2;
    const mid2 = bar2Rect.top + bar2Rect.height / 2;

    if (option === 1) {
      banner.innerText = "🏆 ¡VICTORIA DE LOS ALIADOS!";
      banner.style.background = "linear-gradient(90deg, #00aaff, #0033ff)";
      gifA.style.top = mid1 + "px";
      gifA.classList.add("show");
      setTimeout(() => gifA.classList.add("move-in"), 100);
    } else {
      banner.innerText = "🔥 ¡EL EJE DOMINA EL CAMPO!";
      banner.style.background = "linear-gradient(90deg, #ff0000, #990000)";
      gifE.style.top = mid2 + "px";
      gifE.classList.add("show");
      setTimeout(() => gifE.classList.add("move-in"), 100);
    }

    banner.classList.add("show");

    setTimeout(() => {
      banner.classList.remove("show");
      hideGifs();
      document.body.classList.add("fade-out");

      setTimeout(() => {
        document.getElementById("bar1").style.width = "0%";
        document.getElementById("bar2").style.width = "0%";
        document.getElementById("bar1").innerHTML = "";
        document.getElementById("bar2").innerHTML = "";
        document.getElementById("pozo").innerText = "Pozo: 0 pts";
        document.getElementById("recent-bets").innerHTML = "<strong>Apuestas recientes:</strong>";
        document.getElementById("status").innerText = "Esperando evento de apuestas...";
        document.body.classList.remove("fade-in");
        document.body.style.opacity = "0";
      }, 1000);
    }, 6000);
  }

  async function pollServer() {
    try {
      const res = await fetch("http://localhost:3000/overlay-state", { cache: "no-store" });
      if (!res.ok) throw new Error(res.statusText);
      const state = await res.json();

      overlayReady = true;
      const statusEl = document.getElementById("status");

      updateBars(state);
      updateRecentBets(state.recentBets || []);

      if (typeof state.remaining === "number") localTimer = state.remaining;
      updateTimer(localTimer);

      if (state.active && !state.closed) {
        statusEl.style.color = "#00ff66";
        statusEl.innerText = "¡Apuestas abiertas!";
      } else if (state.closed) {
        statusEl.style.color = "red";
        statusEl.innerText = "¡Apuestas cerradas!";
      } else if (!state.active) {
        statusEl.style.color = "gray";
        statusEl.innerText = "Esperando evento de apuestas...";
      }

      if (state.active && !lastState.active) startOverlay();
      if (state.winner && state.winner !== lastState.winner) declareWinner(state.winner);

      lastState = state;
    } catch (err) {
      console.warn("⚠️ No se pudo contactar al server, reintentando...");
      if (!overlayReady) {
        const statusEl = document.getElementById("status");
        statusEl.style.color = "gray";
        statusEl.innerText = "Conectando al servidor...";
        setTimeout(pollServer, 2000);
      }
    }
  }

  pollServer();
  setInterval(() => {
    pollServer();
    if (localTimer > 0) localTimer--;
  }, 1000);
</script>
</body>
</html>
