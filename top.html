<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Top Saurucoins - Stream Overlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      font-family: 'DM Mono', monospace;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0 0 0 28px;
      height: 100vh;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    body.visible { opacity: 1; }

    #container {
      width: 340px;
      background: rgba(6, 8, 12, 0.88);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 4px;
      overflow: hidden;
      backdrop-filter: blur(16px);
      transform: translateX(-20px);
      opacity: 0;
      transition: transform 0.7s cubic-bezier(0.22,1,0.36,1), opacity 0.7s ease;
    }

    body.visible #container {
      transform: translateX(0);
      opacity: 1;
    }

    #header {
      padding: 14px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    #title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      color: #fff;
      line-height: 1;
    }

    #title span { color: #C8FF00; }

    #subtitle {
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
    }

    #rows { padding: 6px 0 8px; }

    .row {
      display: flex;
      align-items: center;
      padding: 8px 18px;
      gap: 10px;
      opacity: 0;
      transform: translateX(-12px);
      transition: background 0.2s;
    }

    .row.in {
      animation: rowIn 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    @keyframes rowIn {
      to { opacity: 1; transform: translateX(0); }
    }

    .row:hover { background: rgba(255,255,255,0.03); }

    .row-rank {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      width: 24px;
      text-align: center;
      line-height: 1;
      flex-shrink: 0;
    }

    .row:nth-child(1) .row-rank { color: #C8FF00; }
    .row:nth-child(2) .row-rank { color: rgba(255,255,255,0.7); }
    .row:nth-child(3) .row-rank { color: #FF8C42; }
    .row:nth-child(n+4) .row-rank { color: rgba(255,255,255,0.25); }

    /* Insignia de rango */
    .row-insignia {
      width: 30px;
      height: 30px;
      object-fit: contain;
      image-rendering: crisp-edges;
      flex-shrink: 0;
      opacity: 0.92;
    }

    /* Bloque central: nombre + rango + barra */
    .row-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .row-name-line {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .row-name {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.3px;
    }

    .row:nth-child(1) .row-name { color: #fff; }

    .row-faction-flag {
      height: 16px;
      width: auto;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 0 4px rgba(0,0,0,0.5);
      flex-shrink: 0;
      vertical-align: middle;
    }

    .row-rank-label {
      font-size: 9px;
      letter-spacing: 0.8px;
      color: rgba(255,255,255,0.22);
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .row-rank-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 12px;
      letter-spacing: 1px;
      opacity: 0.75;
    }

    .row-rank-sep { opacity: 0.3; }

    .row:nth-child(1) .row-rank-label { color: rgba(200,255,0,0.45); }
    .row:nth-child(2) .row-rank-label { color: rgba(255,255,255,0.3); }
    .row:nth-child(3) .row-rank-label { color: rgba(255,140,66,0.45); }

    .bar-track {
      height: 2px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width 1.2s cubic-bezier(0.22,1,0.36,1);
    }

    .row:nth-child(1) .bar-fill { background: #C8FF00; }
    .row:nth-child(2) .bar-fill { background: rgba(255,255,255,0.5); }
    .row:nth-child(3) .bar-fill { background: #FF8C42; }
    .row:nth-child(n+4) .bar-fill { background: rgba(255,255,255,0.2); }

    .row-pts {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      flex-shrink: 0;
      min-width: 44px;
      text-align: right;
      letter-spacing: -0.5px;
    }

    .row:nth-child(1) .row-pts { color: #C8FF00; }

    #footer {
      padding: 8px 18px 10px;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #footer-coin {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #C8FF00;
      flex-shrink: 0;
      animation: coinSpin 3s ease-in-out infinite;
    }

    @keyframes coinSpin {
      0%,100% { transform: scaleX(1); }
      45% { transform: scaleX(0.08); }
      50% { transform: scaleX(0.08); }
      95% { transform: scaleX(1); }
    }

    #footer-label {
      font-size: 9px;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="header">
      <div id="title">SAURU<span>COINS</span></div>
      <div id="subtitle">Top 6</div>
    </div>
    <div id="rows"></div>
    <div id="footer">
      <div id="footer-coin"></div>
      <div id="footer-label">Clasificación en vivo</div>
    </div>
  </div>

  <script>
    // ── RANGOS (igual que saurucoins.html) ──────────────────────────
    const RANGOS = [
      { num: 1,  nombre: "Recluta",             desde: 0    },
      { num: 2,  nombre: "Soldado raso",        desde: 20   },
      { num: 3,  nombre: "Soldado",             desde: 50   },
      { num: 4,  nombre: "Cabo",                desde: 90   },
      { num: 5,  nombre: "Cabo primero",        desde: 140  },
      { num: 6,  nombre: "Sargento",            desde: 210  },
      { num: 7,  nombre: "Sargento primero",    desde: 300  },
      { num: 8,  nombre: "Sargento mayor",      desde: 410  },
      { num: 9,  nombre: "Subteniente",         desde: 540  },
      { num: 10, nombre: "Teniente",            desde: 700  },
      { num: 11, nombre: "Teniente primero",    desde: 890  },
      { num: 12, nombre: "Capitán",             desde: 1110 },
      { num: 13, nombre: "Mayor",               desde: 1370 },
      { num: 14, nombre: "Teniente coronel",    desde: 1670 },
      { num: 15, nombre: "Coronel",             desde: 2010 },
      { num: 16, nombre: "Brigadier",           desde: 2390 },
      { num: 17, nombre: "General de brigada",  desde: 2650 },
      { num: 18, nombre: "General de división", desde: 2850 },
      { num: 19, nombre: "General de ejército", desde: 3040 },
      { num: 20, nombre: "Mariscal",            desde: 3200 },
    ];

    const FACCION_PREFIJO = { us: "us", cw: "brit", pe: "panzer", wm: "heer" };

    function getRango(puntos) {
      let rango = RANGOS[0];
      for (const r of RANGOS) {
        if (puntos >= r.desde) rango = r;
        else break;
      }
      return rango;
    }

    function rankPrefix(faccion) {
      return FACCION_PREFIJO[faccion] || "us";
    }

    // ── OVERLAY LOGIC ───────────────────────────────────────────────
    let lastVisible = false;
    let lastListJson = "";
    let serverReady = false;
    const rowsEl = document.getElementById("rows");

    async function checkServer() {
      try {
        const res = await fetch("http://localhost:3000/top-overlay-state", { cache: "no-store" });
        if (!res.ok) throw new Error();
        serverReady = true;
        return true;
      } catch {
        serverReady = false;
        return false;
      }
    }

    function buildRows(list) {
      rowsEl.innerHTML = "";
      const maxPts = list.length > 0 ? list[0].points : 1;

      list.forEach((p, i) => {
        const rango   = getRango(p.points);
        const prefix  = rankPrefix(p.faccion);
        const imgNum  = String(rango.num).padStart(2, "0");
        const insigniaSrc = `ranks/${prefix}_${imgNum}.png`;
        const pct = Math.round((p.points / maxPts) * 100);

        const factionFlag = p.faccion
          ? `<img class="row-faction-flag" src="armies/${p.faccion}.png" alt="${p.faccion}" onerror="this.style.display='none'">`
          : "";

        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `
          <div class="row-rank">${p.rank}</div>
          <img class="row-insignia" src="${insigniaSrc}" alt="${rango.nombre}" onerror="this.style.display='none'">
          <div class="row-info">
            <div class="row-name-line">
              <span class="row-name">${p.user}</span>
              ${factionFlag}
            </div>
            <div class="row-rank-label"><span class="row-rank-num">NV ${rango.num}</span><span class="row-rank-sep">·</span>${rango.nombre}</div>
            <div class="bar-track"><div class="bar-fill" data-pct="${pct}"></div></div>
          </div>
          <div class="row-pts">${p.points.toLocaleString()}</div>
        `;
        row.style.animationDelay = `${i * 0.08}s`;
        rowsEl.appendChild(row);
        requestAnimationFrame(() => row.classList.add("in"));
      });

      setTimeout(() => {
        document.querySelectorAll(".bar-fill").forEach(bar => {
          bar.style.width = bar.dataset.pct + "%";
        });
      }, 200);
    }

    async function pollTop() {
      if (!serverReady) {
        const ok = await checkServer();
        if (!ok) return;
      }
      try {
        const res = await fetch("http://localhost:3000/top-overlay-state", { cache: "no-store" });
        if (!res.ok) throw new Error();
        const data = await res.json();
        const listJson = JSON.stringify(data.list || []);
        const changed = data.visible !== lastVisible || listJson !== lastListJson;

        if (data.visible && (data.list || []).length > 0 && changed) {
          buildRows(data.list);
          document.body.classList.add("visible");
        } else if (lastVisible && !data.visible) {
          document.body.style.transition = "opacity 0.8s ease";
          document.body.style.opacity = "0";
          setTimeout(() => {
            document.body.classList.remove("visible");
            document.body.style.opacity = "";
            rowsEl.innerHTML = "";
          }, 800);
        }

        lastVisible = data.visible;
        lastListJson = listJson;
      } catch {
        serverReady = false;
      }
    }

    setInterval(pollTop, 1000);
    (async () => { if (await checkServer()) pollTop(); })();
  </script>
</body>
</html>
